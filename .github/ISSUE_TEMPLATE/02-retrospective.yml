name: "🪞 Tech Note — Retrospective 스타일"
description: "과제 회고 중심. 기술 결정 + 트러블슈팅 + 배운 점을 정리. 가장 진입장벽이 낮은 포맷."
title: "[Retrospective] 키워드 (N주차 · K팀 · 이름)"
labels: ["tech-note", "format:retrospective"]
body:
  - type: markdown
    attributes:
      value: |
        > **언제 고르나** — 과제를 끝낸 직후, 결정 과정과 배운 점을 회고하고 싶을 때.
        > **AI 채점 PR과 별개** — 본 이슈는 피드백용입니다.
        >
        > 제목의 `키워드`, `N`, `K`, `이름` 부분을 본인 내용으로 바꿔주세요.
        > 본문 골격은 가이드입니다. **안 쓰는 섹션은 통째로 지워도 됩니다.**

  - type: input
    id: tldr
    attributes:
      label: "TL;DR"
      description: "5초 안에 핵심을 전하는 1~2줄."
      placeholder: "예) Redisson 분산 락으로 동시성 문제를 해결했고, 정합성 실패율 3% → 0%로 개선."
    validations:
      required: true

  - type: textarea
    id: body
    attributes:
      label: "본문"
      description: |
        아래 골격은 가이드입니다. 본인의 강조점에 맞춰 자유롭게 변형하세요.

        **작성 팁**
        - 기술 결정은 "왜 그 선택을 했는가"가 핵심. 대안과 함께 비교한다.
        - 트러블슈팅엔 Before/After 수치를 곁들이라.
        - 회고에는 "트레이드오프 인식"을 더하면 한 단계 깊어진다.
      value: |
        ## 개요 (Overview)

        - **목표**:
        - **중점 사항**:

        ## 핵심 기술 및 결정 (Technical Decisions)

        기술 나열이 아니라 **"왜 그 선택을 했는가"** 가 핵심. 대안과 함께 비교한다.

        | 기술/설계 항목 | 선택한 대안 | 고려한 대안 | 선택 이유 (Rationale) |
        |---------------|------------|------------|----------------------|
        |               |            |            |                      |

        ## 트러블슈팅 (Troubleshooting)

        마주친 '벽'과 넘은 과정. **수치를 곁들이면 강력해진다.**

        ### 문제 현상

        ### 원인 분석
        1.
        2.

        ### 해결 방안
        -

        ### Before / After 지표
        | 항목 | Before | After |
        |------|--------|-------|
        |      |        |       |

        ## Deep Dive

        새롭게 알게 된 원리. **위키 복붙이 아니라, 본인 과제에 어떻게 적용했는지** 까지 연결한다.

        - **개념/원리**:
        - **본인 과제에 어떻게 작용했나**:

        ## 회고 (Retrospective)

        - **Keep**:
        - **Problem**:
        - **Try**:
        - **트레이드오프 회고**: (내가 택한 선택의 "비용"은 무엇이었나?)
    validations:
      required: true

  - type: textarea
    id: reference
    attributes:
      label: "Reference"
      description: "참고한 공식 문서, 인용한 글, 영상, 본인 코드 블록 링크 등을 자유롭게 정리하세요."
      placeholder: |
        - Redisson 공식 문서: ...
        - 본인 코드: https://github.com/.../blob/...
    validations:
      required: false
