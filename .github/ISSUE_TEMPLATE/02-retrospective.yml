name: "🪞 Tech Note — Retrospective 스타일"
description: "과제 회고 중심. 기술 결정 + 트러블슈팅 + 배운 점을 정리. 가장 진입장벽이 낮은 포맷."
title: "[Retrospective] 키워드 (N주차 · K팀 · 이름)"
labels: ["tech-note", "format:retrospective"]
body:
  - type: markdown
    attributes:
      value: |
        > **언제 고르나** — 과제를 끝낸 직후, 결정 과정과 배운 점을 회고하고 싶을 때.
        > **AI 채점 PR과 별개** — 본 이슈는 피드백용입니다.
        >
        > 제목의 `키워드`, `N`, `K`, `이름` 부분을 본인 내용으로 바꿔주세요.

  - type: input
    id: tldr
    attributes:
      label: "TL;DR"
      description: "5초 안에 핵심을 전하는 1~2줄."
      placeholder: "예) Redisson 분산 락으로 동시성 문제를 해결했고, 정합성 실패율 3% → 0%로 개선."
    validations:
      required: true

  - type: input
    id: audience
    attributes:
      label: "대상 독자"
      description: "누구를 떠올리며 쓰는가?"
      placeholder: "면접관 / 시니어 리뷰어 / 동료 / 미래의 본인"
    validations:
      required: true

  - type: input
    id: related-pr
    attributes:
      label: "관련 PR"
      description: "본 과제 PR 번호 또는 링크."
      placeholder: "#123"
    validations:
      required: true

  - type: textarea
    id: reference
    attributes:
      label: "Reference"
      description: "참고한 공식 문서, 인용한 글, 영상 등."
      placeholder: |
        - Redisson 공식 문서: ...
    validations:
      required: false

  - type: textarea
    id: overview
    attributes:
      label: "개요 (Overview)"
      description: |
        - **목표**: 이번 과제에서 무엇을 만들었는가.
        - **중점 사항**: 어떤 기술적 결정·문제 해결에 집중했는가.
      value: |
        - **목표**:
        - **중점 사항**:
    validations:
      required: true

  - type: textarea
    id: technical-decisions
    attributes:
      label: "핵심 기술 및 결정 (Technical Decisions)"
      description: |
        기술 나열이 아니라 **"왜 그 선택을 했는가"** 가 핵심. 대안과 함께 비교한다.
      value: |
        | 기술/설계 항목 | 선택한 대안 | 고려한 대안 | 선택 이유 (Rationale) |
        |---------------|------------|------------|----------------------|
        |               |            |            |                      |
    validations:
      required: true

  - type: textarea
    id: troubleshooting
    attributes:
      label: "트러블슈팅 (Troubleshooting)"
      description: |
        마주친 '벽'과 넘은 과정. **수치를 곁들이면 강력해진다.**
      value: |
        ### 문제 현상


        ### 원인 분석
        1.
        2.

        ### 해결 방안
        -
        -

        ### Before / After 지표
        | 항목 | Before | After |
        |------|--------|-------|
        |      |        |       |
    validations:
      required: true

  - type: textarea
    id: deep-dive
    attributes:
      label: "Deep Dive"
      description: |
        새롭게 알게 된 원리. **위키 복붙이 아니라, 본인 과제에 어떻게 적용했는지** 까지 연결한다.
      value: |
        - **개념/원리**:
        - **본인 과제에 어떻게 작용했나**:
    validations:
      required: true

  - type: textarea
    id: retrospective
    attributes:
      label: "회고 (Retrospective)"
      description: |
        - **Keep**: 잘했던 점, 유지하고 싶은 방식.
        - **Problem**: 아쉬웠던 점, 구현 못한 것.
        - **Try**: 다음에 시도하고 싶은 기술·습관.
        - **트레이드오프 회고**: 내가 택한 선택의 "비용"은 무엇이었나?
      value: |
        - **Keep**:
        - **Problem**:
        - **Try**:
        - **트레이드오프 회고**:
    validations:
      required: true
