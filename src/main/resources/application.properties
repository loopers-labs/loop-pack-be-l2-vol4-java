# H2 ???? DB
spring.datasource.url=jdbc:h2:mem:loopersdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# H2 ?? (???)
spring.h2.console.enabled=true

# Redis
spring.data.redis.host=localhost
spring.data.redis.port=6379

spring.jpa.properties.hibernate.type.preferred_boolean_jdbc_type=BIT
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

pg.base-url=http://localhost:8082
pg.user-id=loopers
pg.timeout.connect=2000
pg.timeout.read=1000

logging.level.com.loopers.tddstudy=DEBUG
logging.level.org.springframework.web=DEBUG


resilience4j.circuitbreaker.instances.pg.sliding-window-type=TIME_BASED
resilience4j.circuitbreaker.instances.pg.sliding-window-size=5
resilience4j.circuitbreaker.instances.pg.minimum-number-of-calls=5
resilience4j.circuitbreaker.instances.pg.failure-rate-threshold=30
resilience4j.circuitbreaker.instances.pg.wait-duration-in-open-state=10s
resilience4j.circuitbreaker.instances.pg.permitted-number-of-calls-in-half-open-state=5
