server:
  shutdown: graceful
  tomcat:
    threads:
      max: 200 # 최대 워커 스레드 수 (default : 200)
      min-spare: 10 # 최소 유지 스레드 수 (default : 10)
    connection-timeout: 1m # 연결 타임아웃 (ms) (default : 60000ms = 1m)
    max-connections: 8192 # 최대 동시 연결 수 (default : 8192)
    accept-count: 100 # 대기 큐 크기 (default : 100)
    keep-alive-timeout: 60s # 60s
  max-http-request-header-size: 8KB

spring:
  main:
    web-application-type: servlet
  application:
    name: commerce-api
  profiles:
    active: local
  config:
    import:
      - jpa.yml
      - redis.yml
      - logging.yml
      - monitoring.yml

springdoc:
  use-fqn: true
  swagger-ui:
    path: /swagger-ui.html

payment:
  pg:
    base-url: http://localhost:8082
    callback-url: http://localhost:8080/api/v1/payments/callback
    connect-timeout-ms: 1000   # 연결 타임아웃
    read-timeout-ms: 2000      # 응답(접수) 타임아웃 — PG 요청지연 100~500ms 위 여유
  recovery:
    fixed-delay-ms: 30000      # 복구 스케줄러 주기
    pending-grace: PT30S       # 거래키 없는 PENDING을 orderId로 역조회 시작하기까지 유예 (PG 처리지연 1~5s 역산)
    stuck-threshold: PT10M     # 이 시간 넘게 PENDING이면 자동복구로 못 푼 건 — 격리 대상으로 로그/알림(사람이 점검)

resilience4j:
  circuitbreaker:
    circuit-breaker-aspect-order: 1   # Retry보다 바깥(order 낮을수록 바깥) — 재시도 끝난 최종 결과만 서킷에 집계
    instances:
      pgCircuit:
        sliding-window-type: COUNT_BASED
        sliding-window-size: 20
        minimum-number-of-calls: 10          # 표본이 충분할 때만 판단 (초기 소수 호출로 open 방지)
        failure-rate-threshold: 50           # Retry로 transient 흡수 후 기준
        slow-call-duration-threshold: 1s     # PG 정상 지연(100~500ms) 위
        slow-call-rate-threshold: 50
        wait-duration-in-open-state: 20s     # 결제 매출 영향 고려 — 분 대신 초
        permitted-number-of-calls-in-half-open-state: 3
        register-health-indicator: true
        ignore-exceptions:
          - com.loopers.support.error.CoreException   # 도메인/검증 실패는 서킷 집계 제외
  retry:
    retry-aspect-order: 2            # CircuitBreaker 안쪽 — 재시도는 서킷 내부에서 수행
    instances:
      pgRetry:                              # 조회(거래키·orderId) 전용 — 멱등이라 응답유실에도 재시도 안전
        max-attempts: 3
        wait-duration: 200ms
        enable-exponential-backoff: true    # 200ms → 400ms → 800ms — 실패 누적 시 더 물러나 부하 완화
        exponential-backoff-multiplier: 2
        enable-randomized-wait: true        # jitter — 다중 인스턴스의 동시 재시도(thundering herd) 분산
        randomized-wait-factor: 0.5
        ignore-exceptions:
          - com.loopers.support.error.CoreException
      pgRequestRetry:                       # 결제 접수(POST) 전용 — 비멱등 쓰기라 재시도하지 않는다(max-attempts=1).
        max-attempts: 1                     # 5xx가 '거래 생성 後'면 재전송 시 이중 접수/이중 청구 위험. 응답유실·5xx는 폴링이 orderId로 메꿈.

---
spring:
  config:
    activate:
      on-profile: local, test

---
spring:
  config:
    activate:
      on-profile: dev

---
spring:
  config:
    activate:
      on-profile: qa

---
spring:
  config:
    activate:
      on-profile: prd

springdoc:
  api-docs:
    enabled: false