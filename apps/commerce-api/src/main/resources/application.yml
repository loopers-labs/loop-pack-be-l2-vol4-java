server:
  shutdown: graceful
  tomcat:
    threads:
      max: 200 # 최대 워커 스레드 수 (default : 200)
      min-spare: 10 # 최소 유지 스레드 수 (default : 10)
    connection-timeout: 1m # 연결 타임아웃 (ms) (default : 60000ms = 1m)
    max-connections: 8192 # 최대 동시 연결 수 (default : 8192)
    accept-count: 100 # 대기 큐 크기 (default : 100)
    keep-alive-timeout: 60s # 60s
  max-http-request-header-size: 8KB

spring:
  main:
    web-application-type: servlet
  application:
    name: commerce-api
  profiles:
    active: local
  config:
    import:
      - jpa.yml
      - redis.yml
      - logging.yml
      - monitoring.yml

springdoc:
  use-fqn: true
  swagger-ui:
    path: /swagger-ui.html

pg-client:
  base-url: http://localhost:8082
  callback-url: http://localhost:8080/api/v1/payments/callback
  connect-timeout: 1s
  read-timeout: 1s

payment-recovery:
  pending-threshold: 10s
  scan-interval: 30s

resilience4j:
  circuitbreaker:
    instances:
      pg:
        register-health-indicator: true
        sliding-window-type: COUNT_BASED
        sliding-window-size: 10
        minimum-number-of-calls: 5
        failure-rate-threshold: 50         # 요청 40% 실패 환경에서 임계 근처 관찰 (가용성 ↔ 보호 트레이드오프)
        wait-duration-in-open-state: 5s
        permitted-number-of-calls-in-half-open-state: 3
        record-exceptions:                 # transient 인프라 실패만 집계 (business 는 비동기 콜백이라 동기 서킷엔 안 잡힘)
          - org.springframework.web.client.ResourceAccessException
          - org.springframework.web.client.HttpServerErrorException

---
spring:
  config:
    activate:
      on-profile: local, test

---
spring:
  config:
    activate:
      on-profile: dev

---
spring:
  config:
    activate:
      on-profile: qa

---
spring:
  config:
    activate:
      on-profile: prd

springdoc:
  api-docs:
    enabled: false