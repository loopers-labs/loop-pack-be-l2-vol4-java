server:
  shutdown: graceful
  tomcat:
    threads:
      max: 200 # 최대 워커 스레드 수 (default : 200)
      min-spare: 10 # 최소 유지 스레드 수 (default : 10)
    connection-timeout: 1m # 연결 타임아웃 (ms) (default : 60000ms = 1m)
    max-connections: 8192 # 최대 동시 연결 수 (default : 8192)
    accept-count: 100 # 대기 큐 크기 (default : 100)
    keep-alive-timeout: 60s # 60s
  max-http-request-header-size: 8KB

spring:
  main:
    web-application-type: servlet
  application:
    name: commerce-api
  profiles:
    active: local
  config:
    import:
      - jpa.yml
      - redis.yml
      - logging.yml
      - monitoring.yml
  lifecycle:
    timeout-per-shutdown-phase: 60s

springdoc:
  use-fqn: true
  swagger-ui:
    path: /swagger-ui.html

pg:
  base-url: http://localhost:8082
  callback-timeout-seconds: 30   # CompletableFuture orTimeout. 콜백 대기 시간
  callback-url: http://localhost:8080/api/v1/payments/callback

resilience4j:
  circuitbreaker:
    instances:
      pgClient:
        sliding-window-size: 100
        failure-rate-threshold: 50
        slow-call-duration-threshold: 1s
        slow-call-rate-threshold: 50
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 20
        register-health-indicator: true
        automatic-transition-from-open-to-half-open-enabled: true

---
spring:
  config:
    activate:
      on-profile: local, test

# supports/monitoring(monitoring.yml)의 exposure 를 덮어쓴다. spring.config.import 로 들어온
# monitoring.yml 은 non-profile 이라, profile-specific 인 이 문서가 우선한다.
# 부하 테스트 시 서킷브레이커 상태/이벤트를 actuator(:8081)로 확인하기 위해 추가 노출.
management:
  endpoints:
    web:
      exposure:
        include:
          - health
          - prometheus
          - circuitbreakers
          - circuitbreakerevents

---
spring:
  config:
    activate:
      on-profile: dev

---
spring:
  config:
    activate:
      on-profile: qa

---
spring:
  config:
    activate:
      on-profile: prd

springdoc:
  api-docs:
    enabled: false

---
spring:
  config:
    activate:
      on-profile: test
pg:
  callback-timeout-seconds: 2
