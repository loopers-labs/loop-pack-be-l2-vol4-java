server:
  shutdown: graceful
  tomcat:
    threads:
      max: 200 # 최대 워커 스레드 수 (default : 200)
      min-spare: 10 # 최소 유지 스레드 수 (default : 10)
    connection-timeout: 1m # 연결 타임아웃 (ms) (default : 60000ms = 1m)
    max-connections: 8192 # 최대 동시 연결 수 (default : 8192)
    accept-count: 100 # 대기 큐 크기 (default : 100)
    keep-alive-timeout: 60s # 60s
  max-http-request-header-size: 8KB

spring:
  main:
    web-application-type: servlet
  application:
    name: commerce-api
  profiles:
    active: local
  config:
    import:
      - jpa.yml
      - redis.yml
      - logging.yml
      - monitoring.yml

springdoc:
  use-fqn: true
  swagger-ui:
    path: /swagger-ui.html

pg-simulator:
  base-url: http://localhost:8082
  callback-url: http://localhost:8080/api/v1/payments/callback
  connect-timeout: 500ms
  read-timeout: 800ms

loopers:
  payment:
    lookup-empty-failure-delay: 10s

resilience4j.circuitbreaker:
  instances:
    pgPaymentRequest:
      registerHealthIndicator: true
      slidingWindowType: COUNT_BASED
      slidingWindowSize: 10
      minimumNumberOfCalls: 5
      failureRateThreshold: 50
      permittedNumberOfCallsInHalfOpenState: 2
      waitDurationInOpenState: 10s
      eventConsumerBufferSize: 20
    pgPaymentLookup:
      registerHealthIndicator: true
      slidingWindowType: COUNT_BASED
      slidingWindowSize: 10
      minimumNumberOfCalls: 5
      failureRateThreshold: 50
      permittedNumberOfCallsInHalfOpenState: 2
      waitDurationInOpenState: 10s
      eventConsumerBufferSize: 20

resilience4j.retry:
  instances:
    pgPaymentStatusLookup:
      maxAttempts: 3
      waitDuration: 300ms
      retryExceptions:
        - org.springframework.web.client.RestClientException

---
spring:
  config:
    activate:
      on-profile: local, test

---
spring:
  config:
    activate:
      on-profile: dev

---
spring:
  config:
    activate:
      on-profile: qa

---
spring:
  config:
    activate:
      on-profile: prd

springdoc:
  api-docs:
    enabled: false
