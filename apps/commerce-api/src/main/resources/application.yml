server:
  shutdown: graceful
  tomcat:
    threads:
      max: 200 # 최대 워커 스레드 수 (default : 200)
      min-spare: 10 # 최소 유지 스레드 수 (default : 10)
    connection-timeout: 1m # 연결 타임아웃 (ms) (default : 60000ms = 1m)
    max-connections: 8192 # 최대 동시 연결 수 (default : 8192)
    accept-count: 100 # 대기 큐 크기 (default : 100)
    keep-alive-timeout: 60s # 60s
  max-http-request-header-size: 8KB

spring:
  main:
    web-application-type: servlet
  application:
    name: commerce-api
  profiles:
    active: local
  config:
    import:
      - jpa.yml
      - redis.yml
      - kafka.yml
      - logging.yml
      - monitoring.yml

springdoc:
  use-fqn: true
  swagger-ui:
    path: /swagger-ui.html

commerce:
  pg-simulator:
    base-url: http://localhost:8082
    connect-timeout: 300ms
    read-timeout: 800ms
    callback-url: http://localhost:8080/api/v1/payments/callback
  cache:
    product:
      enabled: true
      ttl: 5m
  workers:
    payment:
      enabled: false
      initial-delay-ms: 5000
      fixed-delay-ms: 5000
    event-relay:
      enabled: ${COMMERCE_EVENT_RELAY_ENABLED:false}
      initial-delay-ms: 5000
      fixed-delay-ms: 5000
  consumers:
    coupon-issue:
      enabled: ${COMMERCE_COUPON_ISSUE_CONSUMER_ENABLED:false}

---
spring:
  config:
    activate:
      on-profile: local, test

---
spring:
  config:
    activate:
      on-profile: dev

---
spring:
  config:
    activate:
      on-profile: qa

---
spring:
  config:
    activate:
      on-profile: prd

springdoc:
  api-docs:
    enabled: false
