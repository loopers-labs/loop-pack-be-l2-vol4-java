server:
  shutdown: graceful
  tomcat:
    threads:
      max: 200 # 최대 워커 스레드 수 (default : 200)
      min-spare: 10 # 최소 유지 스레드 수 (default : 10)
    connection-timeout: 1m # 연결 타임아웃 (ms) (default : 60000ms = 1m)
    max-connections: 8192 # 최대 동시 연결 수 (default : 8192)
    accept-count: 100 # 대기 큐 크기 (default : 100)
    keep-alive-timeout: 60s # 60s
  max-http-request-header-size: 8KB

spring:
  main:
    web-application-type: servlet
  application:
    name: commerce-api
  profiles:
    active: local
  config:
    import:
      - jpa.yml
      - redis.yml
      - logging.yml
      - monitoring.yml

springdoc:
  use-fqn: true
  swagger-ui:
    path: /swagger-ui.html

commerce:
  product-like-summary:
    sync-fixed-delay-ms: 5000
    sync-chunk-size: 1000
    sync-max-chunks-per-run: 3
  product-detail-cache:
    ttl-seconds: 30
    jitter-seconds: 5
    negative-ttl-seconds: 10
    lock-ttl-seconds: 3
    lock-wait-millis: 80
    lock-wait-attempts: 3
  product-list-cache:
    ttl-seconds: 30
    jitter-seconds: 3
    lock-ttl-seconds: 3
    lock-wait-millis: 80
    lock-wait-attempts: 3
    cacheable-max-size: 50
    cacheable-max-items: 200

---
spring:
  config:
    activate:
      on-profile: local, test

---
spring:
  config:
    activate:
      on-profile: test

commerce:
  product-like-summary:
    sync-enabled: false

---
spring:
  config:
    activate:
      on-profile: dev

---
spring:
  config:
    activate:
      on-profile: qa

---
spring:
  config:
    activate:
      on-profile: prd

springdoc:
  api-docs:
    enabled: false
