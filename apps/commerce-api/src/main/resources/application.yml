server:
  shutdown: graceful
  tomcat:
    threads:
      max: 200 # 최대 워커 스레드 수 (default : 200)
      min-spare: 10 # 최소 유지 스레드 수 (default : 10)
    connection-timeout: 1m # 연결 타임아웃 (ms) (default : 60000ms = 1m)
    max-connections: 8192 # 최대 동시 연결 수 (default : 8192)
    accept-count: 100 # 대기 큐 크기 (default : 100)
    keep-alive-timeout: 60s # 60s
  max-http-request-header-size: 8KB

spring:
  main:
    web-application-type: servlet
  application:
    name: commerce-api
  profiles:
    active: local
  config:
    import:
      - jpa.yml
      - redis.yml
      - logging.yml
      - monitoring.yml

springdoc:
  use-fqn: true
  swagger-ui:
    path: /swagger-ui.html

pg:
  base-url: http://localhost:8082
  callback-url: http://localhost:8080/api/v1/payments/callback

resilience4j:
  circuitbreaker:
    instances:
      pg-payment:
        sliding-window-size: 10                       # 최근 10회 호출 기준
        failure-rate-threshold: 50                    # 50% 이상 실패 시 OPEN
        slow-call-duration-threshold: 800ms           # 800ms 초과 시 느린 호출로 간주
        slow-call-rate-threshold: 80                  # 느린 호출 80% 이상 시 OPEN
        wait-duration-in-open-state: 10s              # OPEN 후 10초 대기
        permitted-number-of-calls-in-half-open-state: 3  # HALF_OPEN 시 3회 테스트

---
spring:
  config:
    activate:
      on-profile: local, test

---
spring:
  config:
    activate:
      on-profile: dev

---
spring:
  config:
    activate:
      on-profile: qa

---
spring:
  config:
    activate:
      on-profile: prd

springdoc:
  api-docs:
    enabled: false