spring:
  jpa:
    open-in-view: false
    generate-ddl: false
    show-sql: true
    hibernate:
      ddl-auto: create
    properties:
      hibernate:
        default_batch_fetch_size: 100
        timezone.default_storage: NORMALIZE_UTC
        jdbc.time_zone: UTC

datasource:
  mysql-jpa:
    main:
      driver-class-name: org.h2.Driver
      jdbc-url: jdbc:h2:mem:loopers;MODE=MySQL;DB_CLOSE_DELAY=-1
      username: sa
      password:
      pool-name: h2-main-pool
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 3000
      validation-timeout: 5000
      keepalive-time: 0
      max-lifetime: 1800000
      leak-detection-threshold: 0
      initialization-fail-timeout: 1
